spring.application.name=platform

# Database Configuration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Voice Service Configuration
mediasoup.url=http://localhost:3000

# Timeout para WebClient (ms)
voice.webclient.timeout=10000

# Configuración de reintentos para WebClient
voice.webclient.retry.maxAttempts=3
voice.webclient.retry.backoff=1000
voice.webclient.retry.maxBackoff=5000

# Timeout de heartbeat (ms)
voice.heartbeat.timeout=45000

# Configuración del Actor
voice.actor.maxMailboxSize=1000
voice.actor.processing.batchSize=50
voice.actor.processing.timeout=30000
voice.actor.cleanup.interval=10000

# ============================================
# Resilience4j Circuit Breaker Configuration
# ============================================

resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=20
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=10
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=5
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=30s
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.eventConsumerBufferSize=10

resilience4j.circuitbreaker.instances.mediasoup.baseConfig=default

# ============================================
# WebSocket & STOMP Configuration
# ============================================

spring.websocket.send-buffer-size-limit=512000
spring.websocket.send-time-limit=20000

spring.websocket.stomp.message-size-limit=65536
spring.websocket.stomp.send-buffer-size=65536

# ============================================
# Reactive/WebFlux Configuration
# ============================================

spring.reactor.netty.connection-provider.max-idle-time=30s
spring.reactor.netty.connection-provider.max-life-time=60s

spring.reactor.netty.connection-provider.max-connections=1000
spring.reactor.netty.connection-provider.pending-acquire-timeout=45s

# ============================================
# Logging Configuration
# ============================================

logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging=DEBUG

logging.level.dev.martinm.platform.voice=DEBUG
logging.level.dev.martinm.platform.voice.VoiceChannelActor=INFO
logging.level.dev.martinm.platform.voice.VoiceService=INFO

logging.level.io.github.resilience4j=DEBUG

logging.level.reactor.netty=WARN
logging.level.io.netty=WARN

logging.level.org.springframework.web.reactive.function.client=DEBUG

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# Scheduler Configuration
# ============================================

spring.task.scheduling.pool.size=10
spring.task.scheduling.thread-name-prefix=voice-scheduler-

# ============================================
# Memory Management
# ============================================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# Monitoring & Metrics
# ============================================

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

management.metrics.enable.resilience4j.circuitbreaker=true
management.metrics.enable.resilience4j.retry=true

# ============================================
# Session Management
# ============================================

server.servlet.session.timeout=30m

# ============================================
# CORS Configuration
# ============================================

spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:8080
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ============================================
# Server Configuration
# ============================================

server.port=8080

server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# ============================================
# Jackson Configuration
# ============================================

spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ============================================
# Validation
# ============================================

spring.jpa.properties.jakarta.persistence.validation.mode=none